<html>
    <head>
        <title>Registration Form</title>
        <link rel="stylesheet" href="register.css" id="register.html" >
        <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    </head>
    <body>
        <div class="wrapper">
            <form action="QRcode.html">
                <h1>Rigister</h1>
                <div class="input-box">
                    <input text="text" placeholder="Firstname"
                    required>
                    <i class='bx bxs-user' ></i>
                </div>
                <div class="input-box">
                    <input text="text" placeholder="Lastname"
                    required>
                    <i class='bx bxs-user' ></i>
                </div>
                <div class="input-box">
                    <input type="email" placeholder="Email"
                    required>
                    <i class='bx bxs-envelope' ></i>
                </div>
                <div class="input-box">
                    <input type="password" placeholder="Passwod" name="password" minlength="8"
                    required>
                    <i class='bx bxs-lock-alt' ></i>
                </div>
                <div class="input-box">
                    <input type="password" name="ConformPasswod" placeholder="ConformPasswod" minlength="8"
                    required>
                    <i class='bx bxs-lock-alt' ></i>
                </div>
                <div class="input-box">
                    <input type="phone" placeholder="Phone"
                    required>  
                </div>
            <button type="submit" class="btn">Login</button>
            <div class="register-link">
                <p>if already have an account</p>
                <a href="login.html">login</a>
            </div>
            </form>
        </div>
    </body>
</html>
